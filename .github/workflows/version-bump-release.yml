name: Version Bump Release

on:
  push:
    branches:
      - main
    paths:
      - "custom_components/wit_901_wifi/manifest.json"
      - "custom_components/wit_901_wifi/const.py"

permissions:
  contents: write

jobs:
  tag-from-version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate version consistency
        id: versions
        run: |
          python - <<'PY'
          import json
          import pathlib
          import re
          import sys

          manifest = pathlib.Path("custom_components/wit_901_wifi/manifest.json")
          const = pathlib.Path("custom_components/wit_901_wifi/const.py")

          manifest_version = json.loads(manifest.read_text(encoding="utf-8"))["version"]
          m = re.search(r'^VERSION\\s*=\\s*"([^"]+)"', const.read_text(encoding="utf-8"), re.MULTILINE)
          if not m:
              print("Could not find VERSION in const.py")
              sys.exit(1)

          const_version = m.group(1)
          if manifest_version != const_version:
              print(f"Version mismatch: manifest.json={manifest_version} const.py={const_version}")
              sys.exit(1)

          with open(pathlib.Path("/tmp/version.env"), "w", encoding="utf-8") as fh:
              fh.write(f"VERSION={manifest_version}\\n")
              fh.write(f"TAG=v{manifest_version}\\n")
          PY
          cat /tmp/version.env >> "$GITHUB_ENV"

      - name: Check whether tag already exists
        id: tag_check
        run: |
          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create and push tag
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${TAG}" -m "Release ${TAG}"
          git push origin "${TAG}"
